<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo sem obsevers</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;

            align-items: center;
            justify-content: center;
        }
        #screen{
            border: solid 10px gray;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;

            width: 500px;
            height: 500px;
        }
    </style>
</head>
<body>
    <canvas id="screen" width="21" height="21"></canvas>

    <script>
        const screen = document.getElementById("screen");
        const context = screen.getContext('2d')
        const currentPlayer = 'player1'    
        let tamanho = 1
        

        function CreateGame(){
            const state = {
                players:{},
                fruits:{},
                timer:500
            }
            // Player
            function addPlayer(command){
                playerId = command.playerId
                playerX = command.playerX
                playerY = command.playerY

                state.players[playerId] = {
                    x:playerX,
                    y:playerY
                }
            }
            function removePlayer(command){
                playerId = command.playerId

                if(state.players[playerId]){
                    delete state.players[playerId]
                }
            };
            //Fruit
            function addFruit(command){
                fruitId = command.fruitId
                fruitX = command.fruitX
                fruitY = command.fruitY
                if(state.fruits[fruitId]){
                    console.log('FRUTA REPETIDA: ' + fruitId)
                    return addFruit({fruitId : 'fruit ' + Math.floor(Math.random()*screen.width*screen.height*10), fruitX: fruitX, fruitY: fruitY})
                }else{
                    state.fruits[fruitId] = {
                    x:fruitX,
                    y:fruitY
                    }
                }
                
            }
            function removeFruit(command){
                fruitId = command.fruitId

                if(state.fruits[fruitId]){
                    delete state.fruits[fruitId]
                }
            }


            function movePlayer(command){
                const keyPressed = command.keyPressed;
                const player = state.players[command.playerId];

                const aceptedMoves = {
                    ArrowUp(player){
                        if(player.y - 1 >= 0){
                            player.y -= 1
                        }
                    },
                    ArrowDown(player){
                        if(player.y + 2 <= screen.height){
                            player.y += 1
                        }
                    },
                    ArrowLeft(player){
                        if(player.x - 1 >= 0){
                            player.x -= 1
                        }
                    },
                    ArrowRight(player){
                        if(player.x +2 <= screen.width){
                            player.x += 1
                        }
                    },
                    e(){
                        addFruit({fruitId: 'fruit ' + Math.floor(Math.random()*screen.width*screen.height*10), fruitX: Math.floor(Math.random()*screen.width),fruitY: Math.floor(Math.random()*screen.height)})
                    }
                }

                function CheckForFruitCollision(player){
                    for(const FruitId in state.fruits){
                        const fruit = state.fruits[FruitId]
                        if(player.x === fruit.x && player.y === fruit.y){
                            removeFruit({fruitId: FruitId})
                            addFruit({
                            fruitId: 'fruit ' + Math.floor(Math.random()*screen.width*screen.height*10),
                            fruitX: Math.floor(Math.random()*screen.width),
                            fruitY: Math.floor(Math.random()*screen.height)})
                        }
                    }
                }
            

                const moveFunction = aceptedMoves[keyPressed]
                let isLoopRunning = false
                    function sleep(ms) {
                        return new Promise(resolve => setTimeout(resolve, ms))
                    }

                    async function loop(timer, player) {
                        if (isLoopRunning){} // evita múltiplos loops
                        isLoopRunning = true

                        while (true) {
                            const moveFunction = aceptedMoves[keyPressed]

                            if (player && moveFunction) {
                                moveFunction(player)
                                CheckForFruitCollision(player)
                            }

                            await sleep(timer)
                        }
                    }

                if(player && moveFunction){
                    loop(state.timer, player)
                }
            }

            return{
                addPlayer,
                removePlayer,
                addFruit,
                removeFruit,
                movePlayer,
                state
            };
        };

        const game = CreateGame()

        game.addPlayer({
            playerId: currentPlayer,
            playerX: 5,
            playerY: 5
        })
        

        document.addEventListener("keydown", handleKeyDown) //input
        function handleKeyDown(event){
            const keyPressed = event.key

            const command = {
                playerId: currentPlayer,
                keyPressed
            }

                game.movePlayer(command)
        }
        

        renderScreen(); // chama a função para renderizar a imagem
        
        function renderScreen(){ // função para renderizar imagem
            context.fillStyle = 'white'
            context.clearRect(0, 0, screen.width, screen.height) //limpar o canvas

            for(const playerId in game.state.players){
                const player = game.state.players[playerId]
                context.fillStyle = 'black' //cor do jogador
                context.fillRect(player.x, player.y, 1, 1)
            }
            for(const fruitId in game.state.fruits){
                const fruit = game.state.fruits[fruitId]
                context.fillStyle = 'red'
                context.fillRect(fruit.x, fruit.y, 1, 1)
            }

            requestAnimationFrame(renderScreen)// chama a função para renderizar a imagem
        }

    </script>
</body>
</html>
