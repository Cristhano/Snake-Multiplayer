<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo sem obsevers</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;

            align-items: center;
            justify-content: center;
        }
        #screen{
            border: solid 10px gray;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;

            width: 500px;
            height: 500px;
        }
    </style>
</head>
<body>
    <canvas id="screen" width="21" height="21"></canvas>

    <script>
        const screen = document.getElementById("screen");
        const context = screen.getContext('2d')
        const currentPlayer = 'player1'        

        function CreateGame(){
            const state = {
                players:{
                    'player1': { x: 10, y: 10},
                },
                fruits:{}
            }

            function movePlayer(command){
                //console.log('moving ' + command.playerId + ' with ' + command.keyPressed);

                const keyPressed = command.keyPressed;
                const player = state.players[command.playerId];

                if(keyPressed === 'ArrowUp'){
                    player.y -= 1
                }else if(keyPressed === 'ArrowDown'){
                    player.y += 1
                }
                if(keyPressed === 'ArrowLeft'){
                    player.x -= 1
                }else if(keyPressed === 'ArrowRight'){
                    player.x += 1
                }
            }

            return{
                movePlayer,
                state
            };
        };

        const game = CreateGame()
        

        document.addEventListener("keydown", handleKeyDown) //input
        function handleKeyDown(event){
            const keyPressed = event.key

            const command = {
                playerId: 'player1',
                keyPressed
            }

                game.movePlayer(command)
        }
        

        renderScreen(); // chama a função para renderizar a imagem
        
        function renderScreen(){ // função para renderizar imagem
            context.fillStyle = 'white'
            context.clearRect(0, 0, screen.width, screen.height) //limpar o canvas

            for(const playerId in game.state.players){
                const player = game.state.players[playerId]
                context.fillStyle = 'black' //cor do jogador
                context.fillRect(player.x, player.y, 1, 1)
            }

            requestAnimationFrame(renderScreen)// chama a função para renderizar a imagem
        }

    </script>
</body>
</html>
